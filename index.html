<style>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

/* ========================= CONSTANTS ========================= */
const STORAGE_KEY = "quotelog_v1_data";
const SETTINGS_KEY = "quotelog_v1_settings";
const DEFAULT_CATEGORIES = ["อุปกรณ์วิทยาศาสตร์", "อุปกรณ์สำนักงาน", "บรรจุภัณฑ์", "วัตถุดิบ", "อื่นๆ"];
const DRIVE_SCOPE = "https://www.googleapis.com/auth/drive.file";
const DRIVE_FOLDER_NAME = "QuotationApp_Documents";

const EXTRACTION_PROMPT = `อ่านใบเสนอราคา / ใบสั่งซื้อ / invoice ในภาพนี้ แล้วดึงข้อมูลรายการสินค้าทุกรายการที่ปรากฏ

ตอบกลับเป็น JSON array เท่านั้น ห้ามมีข้อความอื่นใดนอกเหนือ JSON ห้ามใช้ markdown code block

แต่ละ object ต้องมีฟิลด์ตรงนี้เท่านั้น:
{
  "supplier": ชื่อบริษัทผู้ขาย/ผู้ออกใบเสนอราคา (string หรือ null),
  "itemName": ชื่อสินค้าหรือรายการ (string),
  "quantity": จำนวนที่สั่งซื้อ (number หรือ null),
  "unit": หน่วยนับ เช่น kg, ชิ้น, ขวด, ลัง (string หรือ null),
  "unitPrice": ราคาต่อหน่วย (number หรือ null),
  "totalPrice": ราคารวมของรายการนั้น (number หรือ null),
  "currency": สกุลเงิน เช่น THB, USD (string, ถ้าไม่ระบุให้ใช้ "THB"),
  "date": วันที่ออกเอกสาร รูปแบบ YYYY-MM-DD (string หรือ null),
  "docNumber": เลขที่เอกสาร/เลขที่ใบเสนอราคา (string หรือ null)
}

ถ้าอ่านไม่ชัดเจนหรือไม่มีข้อมูลในฟิลด์ใด ให้ใส่ null ห้ามเดาหรือสร้างข้อมูลขึ้นเอง
ถ้าในภาพมีสินค้าหลายรายการ ให้แยกเป็นหลาย object ใน array เดียวกัน`;

/* ========================= UTIL: storage ========================= */
function loadJSON(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) { return fallback; }
}
function saveJSON(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) { console.error("save failed", e); }
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
function fmtMoney(n, cur) {
  if (n === null || n === undefined || n === "") return "—";
  const num = Number(n);
  if (isNaN(num)) return String(n);
  return num.toLocaleString("th-TH", { maximumFractionDigits: 2 }) + " " + (cur || "THB");
}
function fmtDate(d) {
  if (!d) return "—";
  return d;
}

/* ========================= UTIL: matching ========================= */
function normalize(s) {
  return (s || "").toString().trim().toLowerCase().replace(/\s+/g, " ");
}
function bigrams(s) {
  const arr = [];
  for (let i = 0; i < s.length - 1; i++) arr.push(s.substring(i, i + 2));
  return arr.length ? arr : [s];
}
function diceScore(a, b) {
  a = normalize(a); b = normalize(b);
  if (!a || !b) return 0;
  if (a === b) return 1;
  const g1 = bigrams(a), g2 = bigrams(b);
  let matches = 0;
  const used = new Array(g2.length).fill(false);
  for (const g of g1) {
    const idx = g2.findIndex((x, i) => !used[i] && x === g);
    if (idx !== -1) { matches++; used[idx] = true; }
  }
  return (2 * matches) / (g1.length + g2.length || 1);
}
function findBestMatch(name, items) {
  let best = null, bestScore = 0;
  for (const it of items) {
    const s = diceScore(name, it.name);
    if (s > bestScore) { bestScore = s; best = it; }
  }
  if (best && bestScore >= 0.55) return { item: best, score: bestScore };
  return null;
}

/* ========================= UTIL: image compress ========================= */
function fileToCompressed(file, maxWidth, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxWidth / img.width);
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL("image/jpeg", quality);
        resolve({ dataUrl, base64: dataUrl.split(",")[1], mimeType: "image/jpeg" });
      };
      img.onerror = reject;
      img.src = ev.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function isPdfFile(file) {
  return file.type === "application/pdf" || file.name.toLowerCase().endsWith(".pdf");
}
if (window.pdfjsLib) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
}
async function renderPdfPages(file, maxWidth, quality) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const pages = [];
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const baseViewport = page.getViewport({ scale: 1 });
    const scale = maxWidth / baseViewport.width;
    const viewport = page.getViewport({ scale });
    const canvas = document.createElement("canvas");
    canvas.width = viewport.width; canvas.height = viewport.height;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    await page.render({ canvasContext: ctx, viewport }).promise;
    const dataUrl = canvas.toDataURL("image/jpeg", quality);
    pages.push({ dataUrl, base64: dataUrl.split(",")[1], mimeType: "image/jpeg", pageNum: i });
  }
  return pages;
}
function dataUrlToBlob(dataUrl) {
  const [head, b64] = dataUrl.split(",");
  const mime = head.match(/data:(.*?);/)[1];
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

/* ========================= API: Claude extraction ========================= */
async function extractFromImage(apiKey, base64, mimeType) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 2000,
      messages: [{
        role: "user",
        content: [
          { type: "image", source: { type: "base64", media_type: mimeType, data: base64 } },
          { type: "text", text: EXTRACTION_PROMPT }
        ]
      }]
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || ("API error " + res.status));
  }
  const data = await res.json();
  const text = data.content.filter(b => b.type === "text").map(b => b.text).join("");
  const clean = text.replace(/```json|```/g, "").trim();
  const parsed = JSON.parse(clean);
  return Array.isArray(parsed) ? parsed : [parsed];
}

/* ========================= API: Google Drive ========================= */
function ensureFolder(accessToken) {
  const q = encodeURIComponent(`name='${DRIVE_FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
  return fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`, {
    headers: { Authorization: "Bearer " + accessToken }
  }).then(r => r.json()).then(d => {
    if (d.files && d.files.length > 0) return d.files[0].id;
    return fetch("https://www.googleapis.com/drive/v3/files", {
      method: "POST",
      headers: { Authorization: "Bearer " + accessToken, "Content-Type": "application/json" },
      body: JSON.stringify({ name: DRIVE_FOLDER_NAME, mimeType: "application/vnd.google-apps.folder" })
    }).then(r => r.json()).then(d2 => d2.id);
  });
}
function uploadToDrive(accessToken, folderId, blob, filename) {
  const metadata = { name: filename, parents: [folderId] };
  const form = new FormData();
  form.append("metadata", new Blob([JSON.stringify(metadata)], { type: "application/json" }));
  form.append("file", blob, filename);
  return fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink", {
    method: "POST",
    headers: { Authorization: "Bearer " + accessToken },
    body: form
  }).then(r => { if (!r.ok) throw new Error("อัปโหลดขึ้น Drive ไม่สำเร็จ"); return r.json(); });
}

/* ========================= SMALL UI PIECES ========================= */
function Toast({ msg, error, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2600); return () => clearTimeout(t); }, []);
  if (!msg) return null;
  return <div className={"toast" + (error ? " error" : "")}>{msg}</div>;
}

function Sheet({ title, onClose, children, footer, center }) {
  return (
    <div className={"overlay" + (center ? " center" : "")} onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="sheet">
        {!center && <div className="sheet-handle"></div>}
        <div className="sheet-header">
          <h2>{title}</h2>
          <button className="close-x" onClick={onClose}>✕</button>
        </div>
        <div className="sheet-body">{children}</div>
        {footer && <div className="sheet-footer">{footer}</div>}
      </div>
    </div>
  );
}

/* ========================= MAIN APP ========================= */
function App() {
  const [items, setItems] = useState(() => loadJSON(STORAGE_KEY, []));
  const [settings, setSettings] = useState(() => loadJSON(SETTINGS_KEY, {
    apiKey: "", googleClientId: "", driveFolderId: "", driveConnected: false
  }));
  const [query, setQuery] = useState("");
  const [activeCat, setActiveCat] = useState("ทั้งหมด");
  const [sortBy, setSortBy] = useState("recent");
  const [selectedId, setSelectedId] = useState(null);
  const [showUpload, setShowUpload] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [toast, setToast] = useState(null);
  const [driveToken, setDriveToken] = useState(null);
  const tokenClientRef = useRef(null);

  useEffect(() => { saveJSON(STORAGE_KEY, items); }, [items]);
  useEffect(() => { saveJSON(SETTINGS_KEY, settings); }, [settings]);

  function notify(msg, isError) { setToast({ msg, error: !!isError }); }

  /* ---- categories present ---- */
  const categories = useMemo(() => {
    const set = new Set(DEFAULT_CATEGORIES);
    items.forEach(it => set.add(it.category || "อื่นๆ"));
    return Array.from(set);
  }, [items]);

  const categoryCounts = useMemo(() => {
    const c = {};
    items.forEach(it => { c[it.category || "อื่นๆ"] = (c[it.category || "อื่นๆ"] || 0) + 1; });
    return c;
  }, [items]);

  /* ---- filtered / sorted list ---- */
  const visibleItems = useMemo(() => {
    let list = items;
    if (activeCat !== "ทั้งหมด") list = list.filter(it => (it.category || "อื่นๆ") === activeCat);
    if (query.trim()) {
      const q = normalize(query);
      list = list.filter(it =>
        normalize(it.name).includes(q) ||
        it.history.some(h => normalize(h.supplier).includes(q))
      );
    }
    const lastDate = (it) => it.history.length ? it.history.reduce((a, h) => h.date && h.date > a ? h.date : a, "") : "";
    const lastPrice = (it) => it.history.length ? it.history[it.history.length - 1].unitPrice : null;
    list = [...list];
    if (sortBy === "recent") list.sort((a, b) => lastDate(b).localeCompare(lastDate(a)));
    else if (sortBy === "name") list.sort((a, b) => a.name.localeCompare(b.name, "th"));
    else if (sortBy === "priceHigh") list.sort((a, b) => (lastPrice(b) ?? -1) - (lastPrice(a) ?? -1));
    else if (sortBy === "priceLow") list.sort((a, b) => (lastPrice(a) ?? Infinity) - (lastPrice(b) ?? Infinity));
    else if (sortBy === "mostHistory") list.sort((a, b) => b.history.length - a.history.length);
    return list;
  }, [items, activeCat, query, sortBy]);

  const selectedItem = items.find(it => it.id === selectedId) || null;

  /* ---- Google Drive auth ---- */
  function ensureTokenClient(onToken) {
    if (!window.google || !window.google.accounts) return null;
    if (!tokenClientRef.current) {
      tokenClientRef.current = google.accounts.oauth2.initTokenClient({
        client_id: settings.googleClientId,
        scope: DRIVE_SCOPE,
        callback: () => {}
      });
    }
    tokenClientRef.current.callback = (resp) => {
      if (resp && resp.access_token) {
        const tok = { access_token: resp.access_token, expiresAt: Date.now() + (resp.expires_in || 3500) * 1000 };
        setDriveToken(tok);
        onToken && onToken(tok.access_token);
      } else {
        onToken && onToken(null);
      }
    };
    return tokenClientRef.current;
  }

  function connectDrive() {
    if (!settings.googleClientId) { notify("กรุณากรอก Google Client ID ในตั้งค่าก่อน", true); return; }
    const tc = ensureTokenClient(async (token) => {
      if (!token) { notify("เชื่อมต่อ Google Drive ไม่สำเร็จ", true); return; }
      try {
        const folderId = await ensureFolder(token);
        setSettings(s => ({ ...s, driveFolderId: folderId, driveConnected: true }));
        notify("เชื่อมต่อ Google Drive สำเร็จ");
      } catch (e) {
        notify("เชื่อมต่อสำเร็จ แต่สร้างโฟลเดอร์ไม่ได้: " + e.message, true);
      }
    });
    if (!tc) { notify("Google API ยังโหลดไม่เสร็จ รอสักครู่แล้วลองใหม่", true); return; }
    tc.requestAccessToken({ prompt: "consent" });
  }

  function disconnectDrive() {
    setDriveToken(null);
    setSettings(s => ({ ...s, driveConnected: false, driveFolderId: "" }));
    notify("ยกเลิกการเชื่อมต่อ Google Drive แล้ว");
  }

  function getAccessToken() {
    return new Promise((resolve, reject) => {
      if (driveToken && Date.now() < driveToken.expiresAt - 60000) { resolve(driveToken.access_token); return; }
      const tc = ensureTokenClient((token) => token ? resolve(token) : reject(new Error("ไม่ได้รับสิทธิ์เข้าถึง Drive")));
      if (!tc) { reject(new Error("Google API ยังไม่พร้อม")); return; }
      tc.requestAccessToken({ prompt: "" });
    });
  }

  /* ---- save extracted rows into items ---- */
  function commitRows(rows) {
    setItems(prevItems => {
      let next = [...prevItems];
      for (const row of rows) {
        const idx = next.findIndex(it => it.id === row.targetItemId);
        const historyEntry = {
          id: uid(),
          date: row.date || null,
          supplier: row.supplier || null,
          quantity: row.quantity ?? null,
          unit: row.unit || null,
          unitPrice: row.unitPrice ?? null,
          totalPrice: row.totalPrice ?? null,
          currency: row.currency || "THB",
          docNumber: row.docNumber || null,
          driveFileId: row.driveFileId || null,
          driveViewLink: row.driveViewLink || null,
          localThumb: row.localThumb || null,
          addedAt: new Date().toISOString()
        };
        if (idx >= 0) {
          next[idx] = { ...next[idx], history: [...next[idx].history, historyEntry] };
        } else {
          next.push({
            id: row.targetItemId,
            name: row.itemName,
            category: row.category || "อื่นๆ",
            createdAt: new Date().toISOString(),
            history: [historyEntry]
          });
        }
      }
      return next;
    });
  }

  /* ---- item management ---- */
  function renameItem(id, name) { setItems(p => p.map(it => it.id === id ? { ...it, name } : it)); }
  function recategorize(id, category) { setItems(p => p.map(it => it.id === id ? { ...it, category } : it)); }
  function deleteHistory(itemId, historyId) {
    setItems(p => p.map(it => it.id === itemId ? { ...it, history: it.history.filter(h => h.id !== historyId) } : it).filter(it => it.history.length > 0 || it.id !== itemId ? true : false));
  }
  function deleteItem(id) {
    setItems(p => p.filter(it => it.id !== id));
    setSelectedId(null);
  }
  function mergeInto(sourceId, targetId) {
    setItems(p => {
      const src = p.find(it => it.id === sourceId);
      if (!src) return p;
      return p.filter(it => it.id !== sourceId).map(it => it.id === targetId ? { ...it, history: [...it.history, ...src.history] } : it);
    });
    setSelectedId(targetId);
  }

  /* ---- backup ---- */
  function exportBackup() {
    const blob = new Blob([JSON.stringify({ items, exportedAt: new Date().toISOString() }, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "quotelog-backup-" + new Date().toISOString().slice(0, 10) + ".json";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
  function importBackup(file) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        const incoming = Array.isArray(parsed.items) ? parsed.items : Array.isArray(parsed) ? parsed : null;
        if (!incoming) throw new Error("รูปแบบไฟล์ไม่ถูกต้อง");
        setItems(prev => {
          const merged = [...prev];
          incoming.forEach(inc => {
            const idx = merged.findIndex(it => it.id === inc.id);
            if (idx >= 0) merged[idx] = inc; else merged.push(inc);
          });
          return merged;
        });
        notify("นำเข้าข้อมูลสำเร็จ (" + incoming.length + " รายการ)");
      } catch (e) {
        notify("นำเข้าไฟล์ไม่สำเร็จ: " + e.message, true);
      }
    };
    reader.readAsText(file);
  }

  return (
    <div>
      <div className="topbar">
        <div className="topbar-row">
          <div className="topbar-title">
            สมุดบันทึกใบเสนอราคา
            <span className="sub">{items.length} รายการสินค้า • {items.reduce((a, it) => a + it.history.length, 0)} ใบเสนอราคา</span>
          </div>
          <button className="icon-btn" onClick={() => setShowSettings(true)} title="ตั้งค่า">⚙</button>
        </div>
        <div className="searchbar">
          <span>🔎</span>
          <input placeholder="ค้นหาชื่อสินค้า หรือ Supplier..." value={query} onChange={e => setQuery(e.target.value)} />
        </div>
      </div>

      <div className="tabs">
        {["ทั้งหมด", ...categories].map(cat => (
          <button key={cat} className={"tab" + (activeCat === cat ? " active" : "")} onClick={() => setActiveCat(cat)}>
            {cat}
            <span className="count">{cat === "ทั้งหมด" ? items.length : (categoryCounts[cat] || 0)}</span>
          </button>
        ))}
      </div>

      <div className="list-wrap">
        {items.length > 0 && (
          <div className="sort-row">
            <span className="meta">{visibleItems.length} รายการ</span>
            <select className="sort-select" value={sortBy} onChange={e => setSortBy(e.target.value)}>
              <option value="recent">เรียง: ล่าสุดก่อน</option>
              <option value="name">เรียง: ชื่อ ก-ฮ</option>
              <option value="priceHigh">เรียง: ราคาล่าสุดสูง-ต่ำ</option>
              <option value="priceLow">เรียง: ราคาล่าสุดต่ำ-สูง</option>
              <option value="mostHistory">เรียง: ซื้อบ่อยที่สุด</option>
            </select>
          </div>
        )}

        {items.length === 0 ? (
          <div className="empty-state">
            <div className="big">📋</div>
            <h3>ยังไม่มีข้อมูล</h3>
            <p>กดปุ่ม + ด้านขวาล่างเพื่อเริ่มเพิ่มใบเสนอราคาใบแรก ระบบจะอ่านข้อมูลให้อัตโนมัติด้วย AI หรือกรอกเองก็ได้</p>
          </div>
        ) : visibleItems.length === 0 ? (
          <div className="empty-state">
            <div className="big">🔍</div>
            <h3>ไม่พบรายการที่ค้นหา</h3>
            <p>ลองเปลี่ยนคำค้นหรือเลือกหมวดอื่น</p>
          </div>
        ) : (
          visibleItems.map(it => {
            const last = it.history[it.history.length - 1];
            return (
              <div key={it.id} className="item-card" onClick={() => setSelectedId(it.id)}>
                <div className="item-card-body">
                  <div className="item-name">{it.name}</div>
                  <div className="item-meta-row">
                    <span className="cat-pill">{it.category}</span>
                    {last && <span className="price-tag"><span className="label">ล่าสุด</span>{fmtMoney(last.unitPrice, last.currency)}{last.unit ? " / " + last.unit : ""}</span>}
                  </div>
                </div>
                <div className="stamp"><span className="num">×{it.history.length}</span><span className="lbl">ประวัติ</span></div>
                <div className="chev">›</div>
              </div>
            );
          })
        )}
      </div>

      <button className="fab" onClick={() => setShowUpload(true)}>+</button>

      {selectedItem && (
        <ItemDetail
          item={selectedItem}
          allItems={items}
          onClose={() => setSelectedId(null)}
          onRename={renameItem}
          onRecategorize={recategorize}
          onDeleteHistory={deleteHistory}
          onDeleteItem={deleteItem}
          onMerge={mergeInto}
          categories={categories}
        />
      )}

      {showUpload && (
        <UploadFlow
          apiKey={settings.apiKey}
          driveConnected={settings.driveConnected}
          driveFolderId={settings.driveFolderId}
          getAccessToken={getAccessToken}
          existingItems={items}
          categories={categories}
          onClose={() => setShowUpload(false)}
          onCommit={(rows) => { commitRows(rows); setShowUpload(false); notify("บันทึกข้อมูลสำเร็จ " + rows.length + " รายการ"); }}
          notify={notify}
        />
      )}

      {showSettings && (
        <SettingsPanel
          settings={settings}
          setSettings={setSettings}
          onClose={() => setShowSettings(false)}
          onConnectDrive={connectDrive}
          onDisconnectDrive={disconnectDrive}
          onExport={exportBackup}
          onImport={importBackup}
          onWipe={() => { if (confirm("ลบข้อมูลทั้งหมดในเครื่องนี้? การกระทำนี้ย้อนกลับไม่ได้")) { setItems([]); notify("ลบข้อมูลทั้งหมดแล้ว"); } }}
          notify={notify}
        />
      )}

      {toast && <Toast msg={toast.msg} error={toast.error} onDone={() => setToast(null)} />}
    </div>
  );
}

/* ========================= UPLOAD FLOW ========================= */
function UploadFlow({ apiKey, driveConnected, driveFolderId, getAccessToken, existingItems, categories, onClose, onCommit, notify }) {
  const [step, setStep] = useState("select"); // select | working | review
  const [files, setFiles] = useState([]); // {id,file,name,thumb,base64,mime,status,error}
  const [rows, setRows] = useState([]); // extracted+editable rows
  const fileInputRef = useRef(null);

  function handleFilesSelected(fileList) {
    const arr = Array.from(fileList).map(f => ({ id: uid(), file: f, name: f.name, status: "wait" }));
    setFiles(arr);
  }

  async function processFile(f) {
    setFiles(prev => prev.map(p => p.id === f.id ? { ...p, status: "work", error: null } : p));
    try {
      let pages; // [{dataUrl, base64, mimeType}]
      let thumbPages;
      if (isPdfFile(f.file)) {
        pages = await renderPdfPages(f.file, 1280, 0.8);
        thumbPages = await renderPdfPages(f.file, 640, 0.45);
      } else {
        pages = [await fileToCompressed(f.file, 1280, 0.8)];
        thumbPages = [await fileToCompressed(f.file, 640, 0.45)];
      }
      const newRows = [];
      for (let pi = 0; pi < pages.length; pi++) {
        const compressed = pages[pi];
        const thumbCompressed = thumbPages[pi] || thumbPages[0];
        const pageLabel = pages.length > 1 ? (f.name + " (หน้า " + (pi + 1) + "/" + pages.length + ")") : f.name;
        const extracted = await extractFromImage(apiKey, compressed.base64, compressed.mimeType);
        extracted.forEach(row => {
          const match = findBestMatch(row.itemName, existingItems);
          newRows.push({
            rowId: uid(),
            sourceFileId: f.id,
            sourceFileName: pageLabel,
            localThumb: thumbCompressed.dataUrl,
            fullDataUrl: compressed.dataUrl,
            itemName: row.itemName || "",
            supplier: row.supplier || "",
            quantity: row.quantity ?? "",
            unit: row.unit || "",
            unitPrice: row.unitPrice ?? "",
            totalPrice: row.totalPrice ?? "",
            currency: row.currency || "THB",
            date: row.date || "",
            docNumber: row.docNumber || "",
            category: match ? match.item.category : (categories[0] || "อื่นๆ"),
            targetItemId: match ? match.item.id : uid(),
            matchFound: !!match
          });
        });
      }
      setFiles(prev => prev.map(p => p.id === f.id ? { ...p, status: "done" } : p));
      return { success: true, rows: newRows };
    } catch (e) {
      setFiles(prev => prev.map(p => p.id === f.id ? { ...p, status: "err", error: e.message } : p));
      return { success: false, rows: [], error: e.message };
    }
  }

  async function processAll() {
    if (!apiKey) { notify("กรุณากรอก Anthropic API Key ในตั้งค่าก่อน หรือเลือก \"กรอกข้อมูลเอง\" ด้านล่าง", true); return; }
    setStep("working");
    let collected = [];
    let anyError = false;
    for (const f of files) {
      const result = await processFile(f);
      collected = collected.concat(result.rows);
      if (!result.success) anyError = true;
    }
    setRows(collected);
    if (!anyError) setStep("review");
  }

  async function retryFailed() {
    const failedFiles = files.filter(f => f.status === "err");
    if (failedFiles.length === 0) return;
    let collected = [];
    let stillError = false;
    for (const f of failedFiles) {
      const result = await processFile(f);
      if (result.success) collected = collected.concat(result.rows);
      else stillError = true;
    }
    if (collected.length) setRows(prev => [...prev, ...collected]);
    if (!stillError) setStep("review");
  }

  function startManualEntry() {
    setRows([{
      rowId: uid(), sourceFileId: null, sourceFileName: "กรอกเอง", localThumb: null, fullDataUrl: null,
      itemName: "", supplier: "", quantity: "", unit: "", unitPrice: "", totalPrice: "",
      currency: "THB", date: "", docNumber: "", category: categories[0] || "อื่นๆ",
      targetItemId: uid(), matchFound: false
    }]);
    setStep("review");
  }

  function addBlankRow() {
    setRows(r => [...r, {
      rowId: uid(), sourceFileId: null, sourceFileName: "กรอกเอง", localThumb: null, fullDataUrl: null,
      itemName: "", supplier: "", quantity: "", unit: "", unitPrice: "", totalPrice: "",
      currency: "THB", date: "", docNumber: "", category: categories[0] || "อื่นๆ",
      targetItemId: uid(), matchFound: false
    }]);
  }

  function updateRow(rowId, patch) {
    setRows(prev => prev.map(r => r.rowId === rowId ? { ...r, ...patch } : r));
  }
  function removeRow(rowId) { setRows(prev => prev.filter(r => r.rowId !== rowId)); }

  function setRowTarget(rowId, targetItemId) {
    if (targetItemId === "__new__") {
      updateRow(rowId, { targetItemId: uid(), matchFound: false });
    } else {
      const match = existingItems.find(it => it.id === targetItemId);
      updateRow(rowId, { targetItemId, matchFound: true, category: match ? match.category : rows.find(r => r.rowId === rowId).category });
    }
  }

  async function confirmSave() {
    const cleaned = [];
    for (const r of rows) {
      if (!r.itemName.trim()) continue;
      let driveFileId = null, driveViewLink = null, localThumb = r.localThumb;
      if (r.fullDataUrl) {
        if (driveConnected) {
          try {
            const token = await getAccessToken();
            const blob = dataUrlToBlob(r.fullDataUrl);
            const filename = (r.itemName || "doc").slice(0, 40).replace(/[^\w\u0E00-\u0E7F]+/g, "_") + "_" + (r.date || Date.now()) + ".jpg";
            const result = await uploadToDrive(token, driveFolderId, blob, filename);
            driveFileId = result.id;
            driveViewLink = result.webViewLink || ("https://drive.google.com/file/d/" + result.id + "/view");
            localThumb = null;
          } catch (e) {
            notify("อัปโหลดขึ้น Drive ไม่สำเร็จ (เก็บสำเนาในเครื่องแทน): " + e.message, true);
          }
        }
      }
      cleaned.push({
        ...r,
        quantity: r.quantity === "" ? null : Number(r.quantity),
        unitPrice: r.unitPrice === "" ? null : Number(r.unitPrice),
        totalPrice: r.totalPrice === "" ? null : Number(r.totalPrice),
        driveFileId, driveViewLink, localThumb
      });
    }
    if (cleaned.length === 0) { notify("กรุณากรอกชื่อสินค้าอย่างน้อย 1 รายการ", true); return; }
    onCommit(cleaned);
  }

  return (
    <Sheet title="เพิ่มใบเสนอราคา" onClose={onClose} footer={
      step === "select" ? (
        <button className="btn btn-rust btn-block" disabled={files.length === 0} onClick={processAll}>
          อ่านข้อมูลด้วย AI ({files.length} ไฟล์)
        </button>
      ) : step === "review" ? (
        <>
          <button className="btn btn-ghost" onClick={onClose}>ยกเลิก</button>
          <button className="btn btn-primary" onClick={confirmSave}>บันทึกทั้งหมด ({rows.filter(r => r.itemName.trim()).length})</button>
        </>
      ) : null
    }>
      {step === "select" && (
        <div>
          <div className="file-pick-zone" onClick={() => fileInputRef.current.click()}>
            📷 แตะเพื่อเลือกไฟล์ใบเสนอราคา (รูปภาพ หรือ PDF)<br/>(เลือกได้มากกว่า 1 ไฟล์)
            <input ref={fileInputRef} type="file" accept="image/*,application/pdf,.pdf" multiple hidden onChange={e => handleFilesSelected(e.target.files)} />
          </div>
          {files.length > 0 && (
            <div style={{ marginTop: 14 }}>
              {files.map(f => (
                <div className="file-thumb-row" key={f.id}>
                  <span className="fname">{f.name}</span>
                  <button className="remove-row-btn" onClick={() => setFiles(prev => prev.filter(p => p.id !== f.id))}>นำออก</button>
                </div>
              ))}
            </div>
          )}
          <div className="divider-stamp">หรือ</div>
          <button className="btn btn-ghost btn-block" onClick={startManualEntry}>✎ กรอกข้อมูลเอง (ไม่ใช้ AI)</button>
          {!apiKey && <p className="hint" style={{ marginTop: 8 }}>* ยังไม่ได้กรอก Anthropic API Key ในตั้งค่า — ฟีเจอร์อ่านด้วย AI จะใช้ไม่ได้จนกว่าจะกรอกก่อน</p>}
        </div>
      )}

      {step === "working" && (
        <div>
          {files.map(f => (
            <div key={f.id} style={{ borderBottom: "1px solid var(--paper-soft)", padding: "9px 0" }}>
              <div className="file-thumb-row" style={{ border: "none", padding: 0 }}>
                <span className="fname">{f.name}</span>
                <span className={"status-pill " + f.status}>
                  {f.status === "wait" ? "รอ" : f.status === "work" ? "กำลังอ่าน..." : f.status === "done" ? "อ่านสำเร็จ" : "ผิดพลาด"}
                </span>
              </div>
              {f.status === "err" && f.error && (
                <div style={{ fontSize: 11.5, color: "var(--danger)", marginTop: 4 }}>{f.error}</div>
              )}
            </div>
          ))}
          {files.length > 0 && files.every(f => f.status === "done" || f.status === "err") && files.some(f => f.status === "err") && (
            <div style={{ marginTop: 16 }}>
              <p className="hint" style={{ marginBottom: 10 }}>มีไฟล์ที่อ่านไม่สำเร็จ {files.filter(f => f.status === "err").length} ไฟล์ — ตรวจสอบข้อความผิดพลาดด้านบน (มักเกิดจาก API Key ไม่ถูกต้อง หรือเครดิตในบัญชี Anthropic หมด) แก้ไขแล้วลองใหม่ได้ หรือไปหน้าตรวจสอบเพื่อกรอกไฟล์ที่พลาดเอง</p>
              <div className="row2">
                <button className="btn btn-ghost" onClick={retryFailed}>↻ ลองไฟล์ที่พลาดใหม่</button>
                <button className="btn btn-primary" onClick={() => setStep("review")}>ไปหน้าตรวจสอบ ({rows.length})</button>
              </div>
            </div>
          )}
        </div>
      )}

      {step === "review" && (
        <div>
          <p className="hint" style={{ marginBottom: 12 }}>ตรวจสอบและแก้ไขข้อมูลก่อนบันทึก — ระบบจับคู่รายการที่คล้ายกันให้อัตโนมัติ เปลี่ยนได้ถ้าจับคู่ผิด</p>
          {rows.map(r => (
            <div className="review-card" key={r.rowId}>
              <div className="src">
                <span>📄 {r.sourceFileName}</span>
                <button className="remove-row-btn" onClick={() => removeRow(r.rowId)}>นำออก</button>
              </div>

              <div className="field">
                <label>ชื่อสินค้า</label>
                <input type="text" value={r.itemName} onChange={e => updateRow(r.rowId, { itemName: e.target.value })} />
              </div>

              <div className="field">
                <label>จับคู่กับรายการ <span className={"match-badge " + (r.matchFound ? "found" : "new")}>{r.matchFound ? "พบรายการเดิม" : "รายการใหม่"}</span></label>
                <select value={r.matchFound ? r.targetItemId : "__new__"} onChange={e => setRowTarget(r.rowId, e.target.value)}>
                  <option value="__new__">🆕 สร้างเป็นรายการใหม่</option>
                  {existingItems.map(it => <option key={it.id} value={it.id}>{it.name}</option>)}
                </select>
              </div>

              <div className="row2">
                <div className="field"><label>Supplier</label><input type="text" value={r.supplier} onChange={e => updateRow(r.rowId, { supplier: e.target.value })} /></div>
                <div className="field"><label>วันที่</label><input type="date" value={r.date} onChange={e => updateRow(r.rowId, { date: e.target.value })} /></div>
              </div>
              <div className="row3">
                <div className="field"><label>จำนวน</label><input type="number" value={r.quantity} onChange={e => updateRow(r.rowId, { quantity: e.target.value })} /></div>
                <div className="field"><label>หน่วย</label><input type="text" value={r.unit} onChange={e => updateRow(r.rowId, { unit: e.target.value })} /></div>
                <div className="field"><label>ราคา/หน่วย</label><input type="number" value={r.unitPrice} onChange={e => updateRow(r.rowId, { unitPrice: e.target.value })} /></div>
              </div>
              <div className="row2">
                <div className="field"><label>ราคารวม</label><input type="number" value={r.totalPrice} onChange={e => updateRow(r.rowId, { totalPrice: e.target.value })} /></div>
                <div className="field"><label>หมวด</label>
                  <select value={r.category} onChange={e => updateRow(r.rowId, { category: e.target.value })}>
                    {categories.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                </div>
              </div>
            </div>
          ))}
          <button className="btn btn-ghost btn-block" onClick={addBlankRow}>+ เพิ่มแถวว่าง</button>
        </div>
      )}
    </Sheet>
  );
}

/* ========================= SETTINGS PANEL ========================= */
function SettingsPanel({ settings, setSettings, onClose, onConnectDrive, onDisconnectDrive, onExport, onImport, onWipe }) {
  const [apiKeyDraft, setApiKeyDraft] = useState(settings.apiKey);
  const [clientIdDraft, setClientIdDraft] = useState(settings.googleClientId);
  const importRef = useRef(null);

  return (
    <Sheet title="ตั้งค่า" onClose={onClose} center>
      <div className="divider-stamp" style={{ marginTop: 0 }}>การอ่านข้อมูลด้วย AI</div>
      <div className="field">
        <label>Anthropic API Key</label>
        <input type="password" placeholder="sk-ant-..." value={apiKeyDraft} onChange={e => setApiKeyDraft(e.target.value)} onBlur={() => setSettings(s => ({ ...s, apiKey: apiKeyDraft }))} />
        <div className="hint">ใช้สำหรับให้ AI อ่านข้อมูลจากรูปใบเสนอราคา เก็บไว้ในเครื่องนี้เท่านั้น ไม่ส่งไปที่อื่น ขอรับ API Key ได้ที่ console.anthropic.com</div>
      </div>

      <div className="divider-stamp">เก็บไฟล์ใบเสนอราคาต้นฉบับ</div>
      <div className="drive-status">
        <span className={"dot " + (settings.driveConnected ? "on" : "off")}></span>
        {settings.driveConnected ? "เชื่อมต่อ Google Drive แล้ว" : "ยังไม่ได้เชื่อมต่อ Google Drive"}
      </div>
      <div className="field">
        <label>Google OAuth Client ID</label>
        <input type="text" placeholder="xxxxxxxxxx.apps.googleusercontent.com" value={clientIdDraft} onChange={e => setClientIdDraft(e.target.value)} onBlur={() => setSettings(s => ({ ...s, googleClientId: clientIdDraft }))} />
        <div className="hint">ขอ Client ID จาก Google Cloud Console (ใช้บัญชี Google ของตัวเอง) — ต้องสร้างหลังจาก deploy ขึ้น GitHub Pages แล้ว เพราะต้องใส่ URL ของเว็บที่ deploy ไว้</div>
      </div>
      {settings.driveConnected ? (
        <button className="btn btn-ghost btn-block" onClick={onDisconnectDrive}>ยกเลิกการเชื่อมต่อ Drive</button>
      ) : (
        <button className="btn btn-rust btn-block" onClick={onConnectDrive}>🔗 เชื่อมต่อ Google Drive</button>
      )}
      <p className="hint" style={{ marginTop: 8 }}>หากไม่เชื่อมต่อ Drive ระบบจะเก็บรูปย่อไว้ในเครื่องนี้แทน (จำกัดพื้นที่ ~5MB)</p>

      <div className="divider-stamp">ข้อมูลในเครื่องนี้</div>
      <p className="hint" style={{ marginTop: -4, marginBottom: 10 }}>ข้อมูลทั้งหมดเก็บอยู่ในเบราว์เซอร์นี้เท่านั้น หากเปลี่ยนเครื่อง/เปลี่ยนเบราว์เซอร์ ข้อมูลจะไม่ติดไปด้วย — แนะนำให้ Export ไฟล์สำรองเก็บไว้เป็นประจำ</p>
      <div className="row2">
        <button className="btn btn-ghost" onClick={onExport}>⬇ Export สำรองข้อมูล</button>
        <button className="btn btn-ghost" onClick={() => importRef.current.click()}>⬆ นำเข้าไฟล์สำรอง</button>
      </div>
      <input ref={importRef} type="file" accept="application/json" hidden onChange={e => { if (e.target.files[0]) onImport(e.target.files[0]); }} />

      <div className="divider-stamp">โซนอันตราย</div>
      <button className="btn btn-danger btn-block" onClick={onWipe}>ลบข้อมูลทั้งหมดในเครื่องนี้</button>
    </Sheet>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
